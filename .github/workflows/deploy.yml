name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.VM_APP_DIR }}"
            export USE_NGINX="${{ secrets.USE_NGINX }}"
            if [[ -z "$APP_DIR" ]]; then APP_DIR="$HOME/pet-food-barcode-lookup"; fi
            if [[ -z "$USE_NGINX" ]]; then USE_NGINX="true"; fi
            bash "$APP_DIR/deploy/remote-deploy.sh"
