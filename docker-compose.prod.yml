# Production behind nginx: app only on localhost (not public port 80).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  app:
    # Replace (not append) base ports — otherwise APP_PORT=8000 + this line double-binds :8000.
    ports: !reset
      - "127.0.0.1:8000:8000"
